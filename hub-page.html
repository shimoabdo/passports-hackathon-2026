<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هاكاثون ابتكار الجوازات 2026 — المنصة الرئيسية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#0c3d2e;
    --green-mid:#175c43;
    --green-pale:#e7f0e9;
    --gold:#c9a24b;
    --gold-soft:#e6d3a0;
    --cream:#f7f3e8;
    --ink:#16231d;
    --ink-soft:#4a5750;
    --line:#d8cfb8;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Almarai', sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(201,162,75,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(23,92,67,0.15), transparent 60%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
    line-height:1.6;
  }
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 80px;}

  header.hero{
    background:linear-gradient(160deg, var(--green-deep), var(--green-mid) 85%);
    border-radius:var(--radius);
    padding:40px 26px 34px;
    color:var(--cream);
    position:relative; overflow:hidden; text-align:center;
    box-shadow:0 12px 30px -14px rgba(12,61,46,0.55);
    margin-bottom:30px;
  }
  header.hero::before{
    content:""; position:absolute; inset:0;
    background-image:repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .eyebrow{
    font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-soft);
    font-weight:800; margin:0 0 12px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .eyebrow::before,.eyebrow::after{content:"";width:24px;height:1px;background:var(--gold-soft);display:inline-block;}
  h1.title{font-family:'Aref Ruqaa', serif; font-size:clamp(26px,4.6vw,38px); margin:0 0 8px; font-weight:700;}
  .subtitle{color:#cfe4d8; font-size:14px; margin:0;}

  .tabs{display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; justify-content:center;}
  .tab-btn{
    font-family:inherit; font-size:13.5px; font-weight:800;
    padding:10px 20px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:var(--ink-soft); cursor:pointer;
  }
  .tab-btn.active{background:var(--green-deep); color:#fff; border-color:var(--green-deep);}

  .group{display:none;}
  .group.active{display:block;}
  .group-title{font-size:13px; font-weight:800; color:var(--ink-soft); margin:0 0 14px; padding-inline-start:2px;}

  .card-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:16px; margin-bottom:8px;}
  a.card{
    display:block; background:#fff; border:1px solid var(--line); border-radius:14px;
    padding:22px 20px; text-decoration:none; color:var(--ink);
    box-shadow:0 10px 24px -18px rgba(12,61,46,0.25);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  a.card:hover{transform:translateY(-3px); box-shadow:0 16px 30px -18px rgba(12,61,46,0.35);}
  .card-icon{
    width:42px;height:42px;border-radius:11px; background:var(--green-pale); color:var(--green-deep);
    display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:12px;
  }
  .card-title{font-size:15.5px; font-weight:800; margin:0 0 4px;}
  .card-sub{font-size:12.5px; color:var(--ink-soft); margin:0;}
  .card-badge{
    display:inline-block; margin-top:10px; font-size:11px; font-weight:800;
    background:var(--gold); color:var(--green-deep); padding:3px 10px; border-radius:999px;
  }

  footer{text-align:center; margin-top:26px; font-size:12px; color:var(--ink-soft);}

  @media (max-width:560px){
    .card-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <p class="eyebrow">هيئة الجوازات × إيجاد التقنية</p>
    <h1 class="title">هاكاثون ابتكار الجوازات 2026</h1>
    <p class="subtitle">المنصة الرئيسية — كل الأدوات والصفحات في مكان واحد</p>
  </header>

  <div class="tabs" id="tabs"></div>

  <div id="groupsHost"></div>

  <footer>هاكاثون ابتكار الجوازات 2026 — بالشراكة مع إيجاد التقنية</footer>
</div>

<script>
  const GROUPS = [
    {
      key: 'participants',
      label: 'المشاركون',
      cards: [
        {
          icon: '📝', title: 'صفحة التسجيل', sub: 'التسجيل في الهاكاثون قبل بدايته',
          href: 'registration-page.html'
        },
        {
          icon: '🛂', title: 'بوابة المشاركين', sub: 'رابط الزوم، الأجندة، والليدربورد لكل الفرق',
          href: 'team-portal.html'
        },
      ]
    },
    {
      key: 'judging',
      label: 'التحكيم',
      cards: [
        {
          icon: '⚖️', title: 'بوابة لجنة التحكيم', sub: 'استمارات تقييم الفرق الخمسة عشر',
          href: 'judging-page.html', badge: 'محمية بباسورد'
        },
      ]
    },
    {
      key: 'organizers',
      label: 'المنظمون',
      cards: [
        {
          icon: '📊', title: 'داشبورد المنظمين', sub: 'ليدربورد لايف، تغطية التحكيم، ومخطط النتائج',
          href: 'organizer-dashboard.html', badge: 'محمية بباسورد'
        },
        {
          icon: '👥', title: 'متابعة المسجلين (CRM)', sub: 'حالة كل مسجل، اتصال، واتساب، وإيميل مباشر',
          href: 'https://airtable.com/app2V2JOzhH382WLW/pagBnRT1hXY7wVCpV'
        },
        {
          icon: '🧩', title: 'تقسيمة الفرق', sub: 'توزيع المسجلين المقبولين على الفرق النهائية',
          href: 'https://airtable.com/app2V2JOzhH382WLW/pag9BMq1GYAy36FuR'
        },
        {
          icon: '🎯', title: 'التحديات والأفكار', sub: 'التحديات التسعة ومتابعة أفكار الفرق المقدَّمة',
          href: 'challenges-page.html'
        },
      ]
    },
  ];

  const tabsEl = document.getElementById('tabs');
  const groupsHost = document.getElementById('groupsHost');

  GROUPS.forEach((group, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = group.label;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.group').forEach(g => g.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('group-' + group.key).classList.add('active');
    };
    tabsEl.appendChild(btn);

    const groupEl = document.createElement('div');
    groupEl.className = 'group' + (i === 0 ? ' active' : '');
    groupEl.id = 'group-' + group.key;

    const cardsHtml = group.cards.map(c => `
      <a class="card" href="${c.href}" target="_blank" rel="noopener">
        <div class="card-icon">${c.icon}</div>
        <p class="card-title">${c.title}</p>
        <p class="card-sub">${c.sub}</p>
        ${c.badge ? `<span class="card-badge">${c.badge}</span>` : ''}
      </a>
    `).join('');

    groupEl.innerHTML = `<div class="card-grid">${cardsHtml}</div>`;
    groupsHost.appendChild(groupEl);
  });
</script>
</body>
</html>
