<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>هاكاثون ابتكار الجوازات 2026 — لجنة التحكيم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#0c3d2e;
    --green-mid:#175c43;
    --green-pale:#e7f0e9;
    --gold:#c9a24b;
    --gold-soft:#e6d3a0;
    --cream:#f7f3e8;
    --ink:#16231d;
    --ink-soft:#4a5750;
    --line:#d8cfb8;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Almarai', sans-serif;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(201,162,75,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(23,92,67,0.15), transparent 60%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
    line-height:1.6;
  }

  .wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px;}

  header.hero{
    background:linear-gradient(160deg, var(--green-deep), var(--green-mid) 85%);
    border-radius:var(--radius);
    padding:34px 26px 30px;
    color:var(--cream);
    position:relative;
    overflow:hidden;
    box-shadow:0 12px 30px -14px rgba(12,61,46,0.55);
    margin-bottom:26px;
  }
  header.hero::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.035) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .eyebrow{
    font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold-soft); font-weight:800; margin:0 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--gold-soft);display:inline-block;}
  h1.title{
    font-family:'Aref Ruqaa', serif;
    font-size:clamp(24px, 4.2vw, 34px);
    margin:0 0 6px;
    font-weight:700;
    line-height:1.3;
  }
  .subtitle{color:#cfe4d8; font-size:14px; margin:0;}

  .stat-row{display:flex; gap:24px; margin-top:20px; flex-wrap:wrap;}
  .stat{background:rgba(255,255,255,0.08); border:1px solid rgba(230,211,160,0.25); border-radius:10px; padding:10px 16px;}
  .stat b{display:block; font-size:20px; color:#fff;}
  .stat span{font-size:11.5px; color:#bcd8c8;}

  .toc{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:18px 20px; margin-bottom:30px;
  }
  .toc-title{font-size:13px; font-weight:800; color:var(--ink-soft); margin:0 0 14px;}
  .toc-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .team-btn{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    text-align:right; font-family:inherit;
    background:var(--green-pale); color:var(--green-deep);
    border:2px solid transparent;
    border-radius:12px; padding:16px 18px; font-size:16px; font-weight:800;
    cursor:pointer;
  }
  .team-btn .arrow{transition:transform .15s ease; font-size:14px; color:var(--ink-soft);}
  .team-btn.active{
    background:var(--green-deep); color:#fff; border-color:var(--gold);
  }
  .team-btn.active .arrow{transform:rotate(90deg); color:var(--gold-soft);}
  .team-btn.done{border-color:#3fa66a;}
  .team-btn.done::after{content:"✓"; color:#3fa66a; font-weight:900; margin-inline-start:6px;}

  .form-shell{
    display:none;
    margin-top:22px;
    border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; background:#fff;
  }
  .form-shell.open{display:block;}
  .form-shell iframe{
    width:100%; height:640px; border:none; display:block;
  }

  footer{text-align:center; margin-top:20px; font-size:12px; color:var(--ink-soft);}

  @media (max-width:560px){
    .toc-grid{grid-template-columns:1fr;}
    .form-shell iframe{height:720px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <p class="eyebrow">هيئة الجوازات × إيجاد التقنية</p>
    <h1 class="title">هاكاثون ابتكار الجوازات 2026</h1>
    <p class="subtitle">بوابة لجنة التحكيم — استمارات تقييم الفرق المتنافسة</p>
    <div class="stat-row">
      <div class="stat"><b>15</b><span>فريقًا متنافسًا</span></div>
      <div class="stat"><b>5</b><span>معايير تقييم مرجّحة</span></div>
    </div>
    <p style="margin-top:16px;"><a href="team-portal.html" style="color:var(--gold-soft); font-weight:800; text-decoration:none; font-size:13px;">→ بوابة المشاركين</a></p>
  </header>

  <nav class="toc">
    <p class="toc-title">اختر الفريق لبدء تحكيمه — استمارة واحدة تفتح في كل مرة</p>
    <div class="toc-grid" id="toc"></div>
  </nav>

  <div id="formHost"></div>

  <footer>هاكاثون ابتكار الجوازات 2026 — بالشراكة مع إيجاد التقنية</footer>
</div>

<script>
  const FORMS = [
    "QKWrQA","lb1AJV","RGa4Ev","ob1BXN","VLAl26","PdeEVx","EkE1y2","rj1KzX",
    "2EykQM","NpQVep","b5y2Ne","kd10O6","vG10qA","LZNE5G","J9xV8J"
  ];

  const toc = document.getElementById('toc');
  const formHost = document.getElementById('formHost');
  let currentOpen = null;

  FORMS.forEach((code, i) => {
    const n = i + 1;

    const btn = document.createElement('button');
    btn.className = 'team-btn';
    btn.id = `btn-${n}`;
    btn.innerHTML = `<span>فريق ${n}</span><span class="arrow">◀</span>`;

    btn.addEventListener('click', () => {
      const alreadyOpen = btn.classList.contains('active');

      // close whatever is open
      document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
      formHost.innerHTML = '';

      if (alreadyOpen) { currentOpen = null; return; }

      btn.classList.add('active');
      btn.classList.add('done'); // mark as visited/judged once opened
      currentOpen = n;

      const shell = document.createElement('div');
      shell.className = 'form-shell open';
      shell.innerHTML = `<iframe src="https://tally.so/r/${code}" loading="lazy" title="استمارة تحكيم فريق ${n}"></iframe>`;
      formHost.appendChild(shell);
      btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    toc.appendChild(btn);
  });
</script>
</body>
</html>
